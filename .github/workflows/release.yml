name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Update VERSION file
        run: echo "${{ steps.get_version.outputs.VERSION }}" > VERSION
      
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build:prod
      
      - name: Create release archive
        run: |
          mkdir -p release
          cp -r backend frontend nginx scripts install.sh uninstall.sh VERSION README.md ARCHITECTURE.md LICENSE release/
          cd release
          tar -czf ../magicmirror-admin-${{ steps.get_version.outputs.VERSION }}.tar.gz .
          cd ..
      
      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            head -n 50 CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG=See commits for changes" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            magicmirror-admin-${{ steps.get_version.outputs.VERSION }}.tar.gz
          body: |
            # MagicMirror Admin Platform v${{ steps.get_version.outputs.VERSION }}
            
            ## Installation
            
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```
            
            ## Changes
            
            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
